apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: coordinator
spec:
  serviceName: coordinator
  replicas: 3
  selector:
    matchLabels:
      app: coordinator
  template:
    metadata:
      labels:
        app: coordinator
    spec:
      containers:
      - name: coordinator
        image: raft-coordinator:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 50051
        - containerPort: 8001
---
apiVersion: v1
kind: Service
metadata:
  name: coordinator
spec:
  clusterIP: None
  selector:
    app: coordinator
  ports:
  - port: 50051
    name: grpc
  - port: 8001
    name: http