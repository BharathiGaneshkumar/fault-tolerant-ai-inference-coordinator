<!DOCTYPE html>
<html>
<head>
<title>Inference Chat</title>
<style>
	body {
		font-family: -apple-system, sans-serif;
		background: #000000;
		color: #e8e3f5;
		margin: 0;
		height: 100vh;
		display: flex;
		flex-direction: column;
	}
	.header {
		padding: 18px 24px;
		border-bottom: 0.5px solid #232323;
		display: flex;
		justify-content: space-between;
		align-items: center;
	}
	.title { font-size: 17px; font-weight: 500; color: #d4c5f9; }
	.target { font-size: 13px; color: #9d8bc4; }
	.intro {
		max-width: 720px;
		width: 100%;
		margin: 20px auto 0;
		padding: 14px 18px;
		background: #0f0f0f;
		border: 0.5px solid #232323;
		border-radius: 12px;
		font-size: 13px;
		color: #9d8bc4;
		line-height: 1.6;
		box-sizing: border-box;
	}
	.messages {
		flex: 1;
		overflow-y: auto;
		padding: 24px;
		display: flex;
		flex-direction: column;
		gap: 16px;
		max-width: 720px;
		width: 100%;
		margin: 0 auto;
		box-sizing: border-box;
	}
	.msg { max-width: 75%; padding: 12px 16px; border-radius: 14px; font-size: 15px; line-height: 1.5; }
	.msg.user { align-self: flex-end; background: #1a1a1a; color: #e8e3f5; }
	.msg.assistant { align-self: flex-start; background: #0f0f0f; border: 0.5px solid #232323; color: #e8e3f5; }
	.msg.meta { align-self: flex-start; font-size: 12px; color: #7a6a9a; padding: 0 4px; }
	.input-bar {
		border-top: 0.5px solid #232323;
		padding: 18px 24px;
		display: flex;
		gap: 10px;
		max-width: 720px;
		width: 100%;
		margin: 0 auto;
		box-sizing: border-box;
	}
	input[type=text] {
		flex: 1;
		background: #0f0f0f;
		border: 0.5px solid #232323;
		border-radius: 10px;
		color: #e8e3f5;
		padding: 12px 14px;
		font-size: 15px;
		outline: none;
	}
	input[type=text]:focus { border-color: #b8a0f0; }
	button {
		background: #b8a0f0;
		color: #1a1428;
		border: none;
		border-radius: 10px;
		padding: 0 20px;
		font-size: 15px;
		font-weight: 500;
		cursor: pointer;
	}
	button:disabled { opacity: 0.5; cursor: default; }
	.typing { display: inline-flex; gap: 4px; align-items: center; }
	.dot { width: 6px; height: 6px; border-radius: 50%; background: #9d8bc4; animation: blink 1.2s infinite; }
	.dot:nth-child(2) { animation-delay: 0.2s; }
	.dot:nth-child(3) { animation-delay: 0.4s; }
	@keyframes blink { 0%, 80%, 100% { opacity: 0.2; } 40% { opacity: 1; } }
</style>
</head>
<body>
	<div class="header">
		<div class="title">Inference chat</div>
		<div class="target" id="target">looking for a leader...</div>
	</div>
	<div class="intro">
		This chat talks to a fault-tolerant AI inference cluster. Coordinator nodes agree on a leader using Raft consensus; the leader picks the least-loaded healthy replica and routes your request to it. Ask anything below.
	</div>
	<div class="messages" id="messages"></div>
	<div class="input-bar">
		<input type="text" id="prompt" placeholder="Ask the cluster something" autofocus>
		<button id="send">Send</button>
	</div>

	<script>
		const ports = [8001, 8002, 8003];
		const messagesEl = document.getElementById("messages");
		const input = document.getElementById("prompt");
		const sendBtn = document.getElementById("send");
		const targetEl = document.getElementById("target");

		function addMessage(text, cls) {
			const el = document.createElement("div");
			el.className = "msg " + cls;
			el.textContent = text;
			messagesEl.appendChild(el);
			messagesEl.scrollTop = messagesEl.scrollHeight;
			return el;
		}

		function addTyping() {
			const el = document.createElement("div");
			el.className = "msg assistant";
			el.innerHTML = `<span class="typing"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span>`;
			messagesEl.appendChild(el);
			messagesEl.scrollTop = messagesEl.scrollHeight;
			return el;
		}

		async function findLeaderPort() {
			for (const port of ports) {
				try {
					const resp = await fetch(`http://localhost:${port}/status`, { signal: AbortSignal.timeout(600) });
					const data = await resp.json();
					if (data.state === 2) return port;
				} catch (e) {}
			}
			return null;
		}

		async function send() {
			const text = input.value.trim();
			if (!text) return;
			input.value = "";
			sendBtn.disabled = true;

			addMessage(text, "user");
			const typingEl = addTyping();

			const port = await findLeaderPort();
			if (!port) {
				typingEl.remove();
				addMessage("Cluster unreachable right now. Check that the coordinators are running.", "assistant");
				sendBtn.disabled = false;
				return;
			}

			const start = Date.now();
			try {
				const resp = await fetch(`http://localhost:${port}/infer`, {
					method: "POST",
					body: JSON.stringify({ prompt: text })
				});
				const data = await resp.json();
				const elapsed = Date.now() - start;
				typingEl.remove();
				addMessage(data.response || "(empty response)", "assistant");
				addMessage(`answered in ${elapsed}ms via node on port ${port}`, "meta");
			} catch (e) {
				typingEl.remove();
				addMessage("Request failed: " + e.message, "assistant");
			}
			sendBtn.disabled = false;
			input.focus();
		}

		sendBtn.addEventListener("click", send);
		input.addEventListener("keydown", e => { if (e.key === "Enter") send(); });

		async function updateTarget() {
			const port = await findLeaderPort();
			targetEl.textContent = port ? `connected · leader on port ${port}` : "cluster unreachable";
		}
		updateTarget();
		setInterval(updateTarget, 3000);
	</script>
</body>
</html>
